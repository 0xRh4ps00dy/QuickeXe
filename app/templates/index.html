<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generador de paquetes eXeLearning</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

<header class="app-header">
  <h1>Generador de paquetes eXeLearning</h1>
  <p class="subtitle">Sube un <strong>DOCX</strong> o <strong>PDF</strong> con texto digital y descarga el paquete listo para importar en eXeLearning.</p>
</header>

<main class="app-main">

  <!-- ── Upload form ──────────────────────────────────────── -->
  <section class="card upload-card">
    <h2>1. Sube el archivo</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <label class="drop-zone" id="dropZone" for="fileInput">
        <span class="drop-icon">📄</span>
        <span class="drop-text">Arrastra aquí tu archivo o <u>haz clic para seleccionar</u></span>
        <span class="drop-hint">DOCX o PDF · máx. 50 MB</span>
        <input type="file" id="fileInput" name="file" accept=".docx,.pdf" required>
      </label>
      <div id="fileInfo" class="file-info hidden"></div>
      <div class="actions-row">
        <button type="button" id="previewBtn" class="btn-secondary" disabled>
          Previsualizar paquete
        </button>
        <button type="submit" id="submitBtn" class="btn-primary" disabled>
          Convertir y descargar
        </button>
      </div>
      <div id="statusMsg" class="status-msg hidden"></div>
    </form>
  </section>

  <section class="card preview-card hidden" id="previewCard">
    <h2>Vista previa del paquete</h2>
    <p class="preview-intro">Así se verá la estructura y el contenido antes de importarlo en eXeLearning.</p>
    <div class="preview-meta" id="previewMeta"></div>

    <div class="preview-layout">
      <aside>
        <h3>Páginas</h3>
        <ul id="previewNav" class="preview-nav"></ul>
      </aside>
      <div class="preview-frame-wrap">
        <iframe
          id="previewFrame"
          class="preview-frame"
          title="Previsualización del paquete eXeLearning"
        ></iframe>
      </div>
    </div>
  </section>

</main>

<footer class="app-footer">
  <p>Generador basado en <a href="https://exelearning.net/" target="_blank" rel="noopener">eXeLearning</a></p>
</footer>

<script src="/static/js/app.js"></script>
</body>
</html>
